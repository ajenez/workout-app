<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Workout Finder</title>
<style>
  :root {
    --bg: #0f1419;
    --bg-soft: #1a212b;
    --card: #1e2733;
    --card-hover: #26313f;
    --accent: #ff5a5f;
    --accent-soft: #ff5a5f33;
    --accent-2: #4dd0e1;
    --text: #eef2f6;
    --text-dim: #9aa7b4;
    --muscle: #3a4757;
    --muscle-hover: #ff8a8d;
    --muscle-active: #ff5a5f;
    --radius: 16px;
    --shadow: 0 10px 30px rgba(0,0,0,0.35);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: radial-gradient(1200px 600px at 50% -10%, #1d2733 0%, var(--bg) 60%);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  header {
    text-align: center;
    padding: 26px 16px 8px;
  }
  header h1 {
    margin: 0;
    font-size: 1.7rem;
    letter-spacing: -0.5px;
  }
  header h1 .accent { color: var(--accent); }
  header p {
    margin: 6px 0 0;
    color: var(--text-dim);
    font-size: 0.92rem;
  }

  .wrap {
    max-width: 920px;
    margin: 0 auto;
    padding: 16px;
    display: grid;
    grid-template-columns: minmax(280px, 1fr) minmax(300px, 1.05fr);
    gap: 20px;
    align-items: start;
  }

  @media (max-width: 760px) {
    .wrap { grid-template-columns: 1fr; gap: 14px; padding: 12px; }
    header { padding: 18px 16px 6px; }
    /* Cap the figure height so the quick-pick chips and results stay within
       reach on a phone instead of being a full screen-scroll below the figure. */
    svg.body.on { height: 46vh; width: auto; max-width: 100%; margin: 0 auto; }
  }

  .panel {
    background: var(--bg-soft);
    border: 1px solid #2a3543;
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow);
  }

  /* View toggle */
  .toggle {
    display: flex;
    gap: 6px;
    background: var(--card);
    padding: 5px;
    border-radius: 999px;
    width: fit-content;
    margin: 0 auto 14px;
  }
  .toggle button {
    border: none;
    background: transparent;
    color: var(--text-dim);
    padding: 8px 22px;
    border-radius: 999px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: 0.18s;
  }
  .toggle button.on {
    background: var(--accent);
    color: #fff;
  }

  .figure-stage { position: relative; }
  svg.body { width: 100%; height: auto; display: none; }
  svg.body.on { display: block; }

  .muscle {
    fill: var(--muscle);
    stroke: #0f1419;
    stroke-width: 1.2;
    cursor: pointer;
    transition: fill 0.15s ease;
  }
  .muscle:hover { fill: var(--muscle-hover); }
  .muscle.selected { fill: var(--muscle-active); }
  .body-base {
    fill: #2a3441;
    stroke: #0f1419;
    stroke-width: 1.2;
    stroke-linejoin: round;
  }
  .muscle { stroke-linejoin: round; }
  /* thin separation lines (pec split, ab grid, spine) for a more anatomical look */
  .detail {
    fill: none;
    stroke: #0f1419;
    stroke-width: 1.3;
    stroke-linecap: round;
    opacity: 0.4;
    pointer-events: none;
  }
  .hair {
    fill: #232d39;
    stroke: #0f1419;
    stroke-width: 1.2;
    stroke-linejoin: round;
  }

  .hint {
    text-align: center;
    color: var(--text-dim);
    font-size: 0.82rem;
    margin-top: 6px;
  }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    justify-content: center;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid #2a3543;
  }
  .chips button {
    border: 1px solid #33414f;
    background: var(--card);
    color: var(--text-dim);
    padding: 7px 12px;
    border-radius: 999px;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: 0.15s;
  }
  .chips button:hover { color: var(--text); border-color: var(--accent); }
  .chips button.on {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }

  /* Results panel */
  #results .placeholder {
    color: var(--text-dim);
    text-align: center;
    padding: 40px 10px;
  }
  #results .placeholder .big { font-size: 2.2rem; margin-bottom: 8px; }

  .group-head {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 4px;
  }
  .group-head h2 {
    margin: 0;
    font-size: 1.3rem;
  }
  .group-head .dot {
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--accent);
    flex: none;
  }
  .group-sub {
    color: var(--text-dim);
    font-size: 0.86rem;
    margin: 0 0 14px;
  }

  .ex-wrap { margin-bottom: 10px; }
  .ex {
    background: var(--card);
    border: 1px solid #2a3543;
    border-radius: 12px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: 0.15s;
  }
  .ex:hover { background: var(--card-hover); }
  .ex .info { flex: 1; min-width: 0; }
  .ex .name { font-weight: 600; font-size: 0.98rem; }
  .ex .desc { color: var(--text-dim); font-size: 0.82rem; margin-top: 2px; }
  .ex .badge {
    display: inline-block;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--accent-2);
    border: 1px solid #2f4a50;
    border-radius: 999px;
    padding: 2px 8px;
    margin-top: 6px;
  }
  .ex .watch {
    flex: none;
    font-family: inherit;
    border: none;
    cursor: pointer;
    background: var(--accent);
    color: #fff;
    font-weight: 600;
    font-size: 0.8rem;
    padding: 9px 14px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .ex .watch:active { transform: scale(0.96); }
  .ex .watch.on { background: var(--card-hover); color: var(--text); }

  /* inline video embed (expands under the exercise on tap) */
  .player { display: none; margin-top: 8px; }
  .player.open { display: block; }
  .player iframe {
    width: 100%;
    aspect-ratio: 16 / 9;
    border: 0;
    border-radius: 12px;
    display: block;
    background: #000;
  }
  .player .fallback {
    display: inline-block;
    margin-top: 6px;
    font-size: 0.74rem;
    color: var(--text-dim);
    text-decoration: none;
  }
  .player .fallback:hover { color: var(--text); }

  footer {
    text-align: center;
    color: var(--text-dim);
    font-size: 0.78rem;
    padding: 10px 16px 30px;
  }
</style>
</head>

  const YT = "https://www.youtube.com/results?search_query=";

  function show(group) {
    const d = DATA[group];
    if (!d) return;

    // highlight selection across both svgs
    document.querySelectorAll('.muscle').forEach(m => {
      m.classList.toggle('selected', m.dataset.group === group);
    });
    // highlight matching chip
    document.querySelectorAll('#chips button').forEach(b => {
      b.classList.toggle('on', b.dataset.group === group);
    });

    const items = d.ex.map(e => {
      const q = encodeURIComponent(e.name + " proper form tutorial");
      return `
        <div class="ex-wrap">
          <div class="ex">
            <div class="info">
              <div class="name">${e.name}</div>
              <div class="desc">${e.desc}</div>
              <span class="badge">${e.level}</span>
            </div>
            <button class="watch" onclick="toggleVid(this)" data-yt="${e.yt}" data-q="${q}">▶ Watch</button>
          </div>
          <div class="player"></div>
        </div>`;
    }).join("");

    document.getElementById('results').innerHTML = `
      <div class="group-head"><span class="dot"></span><h2>${d.title}</h2></div>
      <p class="group-sub">${d.sub}</p>
      ${items}`;

    if (window.innerWidth <= 760) {
      document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
  }

  // Expand/collapse an inline YouTube player under an exercise (one open at a time).
  function toggleVid(btn) {
    const player = btn.closest('.ex-wrap').querySelector('.player');
    const isOpen = player.classList.contains('open');
    document.querySelectorAll('.player.open').forEach(p => { p.classList.remove('open'); p.innerHTML = ''; });
    document.querySelectorAll('.watch.on').forEach(b => { b.classList.remove('on'); b.textContent = '▶ Watch'; });
    if (isOpen) return; // tapping the open one just closes it
    player.innerHTML =
      `<iframe src="https://www.youtube-nocookie.com/embed/${btn.dataset.yt}?rel=0&autoplay=1&playsinline=1"`
      + ` title="Exercise demo" loading="lazy"`
      + ` allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"`
      + ` allowfullscreen></iframe>`
      + `<a class="fallback" href="${YT}${btn.dataset.q}" target="_blank" rel="noopener">Not the right video? Search YouTube ↗</a>`;
    player.classList.add('open');
    btn.classList.add('on');
    btn.textContent = '✕ Close';
    if (window.innerWidth <= 760) player.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  function setView(v) {
    const front = v === 'front';
    document.getElementById('svg-front').classList.toggle('on', front);
    document.getElementById('svg-back').classList.toggle('on', !front);
    document.getElementById('btn-front').classList.toggle('on', front);
    document.getElementById('btn-back').classList.toggle('on', !front);
  }

  document.querySelectorAll('.muscle').forEach(m => {
    m.addEventListener('click', () => show(m.dataset.group));
  });

  // Build quick-pick chips from the data, in a sensible order.
  const CHIP_ORDER = ["chest","back","shoulders","biceps","triceps","forearms",
                      "core","lowerback","traps","glutes","quads","hamstrings","calves"];
  const chips = document.getElementById('chips');
  CHIP_ORDER.forEach(g => {
    const b = document.createElement('button');
    b.dataset.group = g;
    b.textContent = DATA[g].title;
    b.addEventListener('click', () => show(g));
    chips.appendChild(b);
  });
</script>
